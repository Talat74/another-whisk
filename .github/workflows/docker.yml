name: docker pipeline ci/cd

on:
  push:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/anotherwhisk:latest
      CONTAINER_NAME: anotherwhisk-app
      PORT: 3000 
    steps:
      
      - name: checkout repo
        uses: actions/checkout@v4

      - name: login to deocker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
     
      - name: build docker image
        run: |
          docker build -t $IMAGE_NAME  .
      
      - name: tag image with version
        run: |
          docker tag $IMAGE_NAME ${{ secrets.DOCKERHUB_USERNAME }}/anotherwhisk:${{ github.sha }}

      - name: push docker image
        run: |
          docker push $IMAGE_NAME
 
      - name: deploy to GCP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            docker pull $IMAGE_NAME

            docker stop $CONTAINER_NAME || true
            dokcer rm $CONTAINER_NAME || true

            dokcer run -d \
               --restart always \
               --name $CONTAINER_NAME \
               -p $PORT:3000 \
               $IMAGE_NAME
            
            dokcer ps
