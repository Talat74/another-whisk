name: docker pipeline ci/cd

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  id-token: write 

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/anotherwhisk:latest
      CONTAINER_NAME: anotherwhisk-app
      PORT: 3000 
    steps:
      
      - name: checkout repo
        uses: actions/checkout@v4

      - name: login to deocker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
     
      - name: build docker image
        run: |
          docker build -t $IMAGE_NAME  .
      
      - name: tag image with version
        run: |
          docker tag $IMAGE_NAME ${{ secrets.DOCKERHUB_USERNAME }}/anotherwhisk:${{ github.sha }}

      - name: push docker image
        run: |
          docker push $IMAGE_NAME
 
      - name: deploy to GCP
        uses: google-github-actions/auth@v2 
        with:
          workload_identity_provider: "projects/302992184606/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions-deployer@project-4fb5f513-2a02-47c0-af8.iam.gserviceaccount.com"
      
      - name: setup gcp sdk
        uses: google-github-actions/setup-gcloud@v2

      - name: deploy to gcp vm
        run: |
          gcloud compute ssh docker-vm \
            --zone us-central1-f \
            --command " 
              docker pull $IMAGE_NAME

              docker stop $CONTAINER_NAME || true
              docker rm $CONTAINER_NAME || true

              docker run -d \
                 --restart always \
                 --name $CONTAINER_NAME \
                 -p $PORT:3000 \
                 $IMAGE_NAME
            
              docker ps
            "
